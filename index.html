<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendship Checker Poketch App</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        #container {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0); /* Transparent for overlay */
        }
        #mainCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Keep temporary hidden canvas for cropping */
        #bufferCanvas {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="mainCanvas" width="1920" height="1080"></canvas>
        <canvas id="bufferCanvas"></canvas>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
