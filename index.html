<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendship Checker Poketch App</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        #container {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0); /* Transparent for overlay */
        }
        #mainCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Keep temporary hidden canvas for cropping */
        #bufferCanvas {
            display: none;
        }
        .pokemon-message {
            position: absolute;
            left: 0;
            top: 0;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 24px;
            color: yellow;
            text-align: center;
            pointer-events: none;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
            width: max-content;
            max-width: 320px;
            transform-origin: center bottom;
            will-change: transform;
            display: none;
            z-index: 1000;
        }
        .pokemon-message img {
            vertical-align: bottom;
            height: 32px;
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="mainCanvas" width="1920" height="1080"></canvas>
        <canvas id="bufferCanvas"></canvas>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
