# Workflow for building and deploying a Vite app to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        # We inject the secrets as Environment Variables here
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract Version
        id: version
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # Look for decimal-based version at the start (e.g., 0.14.6)
          VERSION=$(echo "$MSG" | grep -oE '^[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1)
          
          if [ -n "$VERSION" ]; then
            echo "VERSION_FOUND=true" >> $GITHUB_OUTPUT
            echo "REL_TAG=v$VERSION" >> $GITHUB_OUTPUT
            echo "REL_NAME=Friendship Checker - v$VERSION" >> $GITHUB_OUTPUT
          else
            echo "VERSION_FOUND=false" >> $GITHUB_OUTPUT
            echo "REL_TAG=latest" >> $GITHUB_OUTPUT
            echo "REL_NAME=Friendship Checker - Latest Update" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.REL_TAG }}
          name: ${{ steps.version.outputs.REL_NAME }}
          body: |
            ## 🎉 Deployment Successful!
            
            The latest version of the Pokémon Friendship Overlay is now live.
            
            ### 🚀 Setting Up Your Overlay
            [Click here for the Help Page & URL Generator](https://itsmejoji.github.io/Friendship-Checker-Overlay/help/)
            
            Use the link above to generate your OBS browser source URL and get started.
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
